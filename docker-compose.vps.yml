# Founder Calendar — VPS deployment (72.61.138.192)
#
# Runs alongside the existing "microsaas" stack. Idle host ports are used so
# nothing collides with microsaas (3000 / 8000 / 5432 / 6379 / 80 / 443):
#   frontend -> 8081   backend -> 8001   postgres -> internal only
#
#   docker compose -f docker-compose.vps.yml up -d --build
#
# App:  http://72.61.138.192:8081      API: http://72.61.138.192:8001
name: founder_calendar

services:
  db:
    image: postgres:16-alpine
    container_name: founder_cal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: founder
      POSTGRES_PASSWORD: founder_pass
      POSTGRES_DB: founder_calendar
    # Not published to the host — only the backend reaches it over the network.
    volumes:
      - founder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U founder -d founder_calendar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: founder_cal_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://founder:founder_pass@db:5432/founder_calendar
      # Secret comes from the untracked /root/Founder_Calendar/.env (not in git).
      # Deploy fails fast if it isn't set.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in /root/Founder_Calendar/.env}"
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      GOOGLE_CLIENT_ID: "815688246946-fc023atjo0dkeo2pqua2difekf3c11qa.apps.googleusercontent.com"
      CORS_ORIGINS: "https://fc.socialeagle.ai"
      # Base URL used to build password-reset links in emails.
      APP_BASE_URL: "https://fc.socialeagle.ai"
      # SMTP for password-reset emails, notification emails and the daily digest.
      # Real values come from an untracked /root/Founder_Calendar/.env on the VPS
      # (kept out of git). When SMTP_HOST is empty, reset links are logged to the
      # backend instead of emailed and notification email is skipped with a
      # warning - the in-app bell is unaffected either way.
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_TLS: "${SMTP_TLS:-true}"
      # The in-process thread that sends daily agenda digests.
      DIGEST_ENABLED: "${DIGEST_ENABLED:-true}"
      # Web Push. Blank = push stays off and the Settings toggle hides itself.
      # Generate a pair with `python -m app.gen_vapid` and put BOTH in
      # /root/Founder_Calendar/.env; the private key is a secret and must never
      # reach git. Passed through here on purpose: without these lines, adding
      # the keys to .env would change nothing and push would silently no-op.
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:support@socialeagle.ai}"
    ports:
      # Bound to localhost — only nginx (on this host) reaches it. Public
      # access is via https://backend.fc.socialeagle.ai.
      - "127.0.0.1:8001:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "https://backend.fc.socialeagle.ai"
        VITE_GOOGLE_CLIENT_ID: "815688246946-fc023atjo0dkeo2pqua2difekf3c11qa.apps.googleusercontent.com"
        # Show the real "Sign in with Google" button. Requires the OAuth client's
        # Authorized JavaScript origins to include https://fc.socialeagle.ai.
        VITE_GOOGLE_SIGNIN: "true"
    container_name: founder_cal_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Bound to localhost — only nginx (on this host) reaches it. Public
      # access is via https://fc.socialeagle.ai.
      - "127.0.0.1:8081:8080"

volumes:
  founder_pgdata:
