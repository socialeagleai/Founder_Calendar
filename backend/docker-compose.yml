# Explicit project name avoids volume/orphan collisions with other "backend/" dirs.
name: founder_calendar

services:
  db:
    image: postgres:16-alpine
    container_name: founder_calendar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: founder
      POSTGRES_PASSWORD: founder_pass
      POSTGRES_DB: founder_calendar
    ports:
      # Host 5433 → container 5432 (host already runs a local Postgres on 5432).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U founder -d founder_calendar"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional DB admin UI — open http://localhost:5050 (admin@founder.local / admin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: founder_calendar_pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@founder.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
